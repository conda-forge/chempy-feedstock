schema_version: 1

context:
  name: chempy
  version: 0.10.1

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 7112a2fe6cfe49730870de19e6061ff7f174a7d626a64244ab0505afa591cba0

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - matplotlib-base >=2.2.5
    - notebook >=5.7.8
    - numpy >=1.16.4
    - python >=${{ python_min }}
    - scipy >=1.2.3
    - sym >=0.3.4
    - sympy >=1.5.1
    - pytest
    - pyparsing
    - pulp
    - dot2tex
    - pyneqsys
    - pyodesys
    - quantities
    - tabulate

tests:
  - python:
      imports:
        - chempy
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check

about:
  summary: A package useful for chemistry written in Python.
  license: BSD-2-Clause
  license_file: LICENSE
  homepage: https://github.com/bjodah/chempy

extra:
  recipe-maintainers:
    - ProfLeao
    - bjodah
    - jan-janssen
